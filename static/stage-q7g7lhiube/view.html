<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow, noarchive, nosnippet">
<meta name="theme-color" content="#1a1a2e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Stage · Viewer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Source+Serif+4:ital,wght@0,400;0,600;0,700;1,400;1,600&family=JetBrains+Mono:wght@400;500;600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  :root {
    --navy-dark: #1a1a2e;
    --navy-mid: #16213e;
    --navy-light: #0f3460;
    --blue: #4a9eff;
    --green: #48bb78;
    --amber: #e8a87c;
    --purple: #a78bfa;
    --silver: #a0aec0;
    --text: #e2e8f0;
    --text-dim: #b0bcd0;
    --text-muted: #718096;
    --text-faded: #4a5568;
    --line: rgba(255,255,255,0.08);
    --line-strong: rgba(255,255,255,0.15);
    --code-bg: rgba(255,255,255,0.05);
  }

  html, body {
    background: var(--navy-dark);
    color: var(--text);
    font-family: 'Inter', -apple-system, system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }
  body {
    background: linear-gradient(180deg, var(--navy-dark) 0%, var(--navy-mid) 100%);
    background-attachment: fixed;
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
  }

  /* ── Top bar ─────────────────────────────────── */
  .topbar {
    position: sticky;
    top: 0;
    background: rgba(26, 26, 46, 0.85);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--line);
    padding: 0.85rem 1.25rem;
    padding-top: calc(0.85rem + env(safe-area-inset-top));
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 10;
  }
  .back-link {
    color: var(--silver);
    text-decoration: none;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.8rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 0.35rem 0.7rem;
    border-radius: 6px;
    transition: all 0.15s;
  }
  .back-link:hover, .back-link:active {
    background: rgba(74, 158, 255, 0.1);
    color: var(--blue);
  }
  .doc-name {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem;
    color: var(--text-muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .size-toggle {
    display: flex;
    gap: 0.25rem;
  }
  .size-btn {
    background: transparent;
    border: 1px solid var(--line);
    color: var(--text-muted);
    width: 32px;
    height: 32px;
    border-radius: 6px;
    font-family: 'Source Serif 4', serif;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    font-size: 0.8rem;
  }
  .size-btn.sm { font-size: 0.7rem; }
  .size-btn.md { font-size: 0.85rem; }
  .size-btn.lg { font-size: 1rem; }
  .size-btn.active {
    background: rgba(74, 158, 255, 0.15);
    color: var(--blue);
    border-color: var(--blue);
  }

  /* ── Read-aloud controls ─────────────────────── */
  .tts {
    display: flex;
    gap: 0.3rem;
    align-items: center;
    margin-right: 0.5rem;
  }
  .tts-btn {
    background: rgba(72, 187, 120, 0.08);
    border: 1px solid rgba(72, 187, 120, 0.3);
    color: var(--green);
    height: 32px;
    padding: 0 0.7rem;
    border-radius: 6px;
    cursor: pointer;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem;
    letter-spacing: 0.05em;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 0.3rem;
  }
  .tts-btn:hover, .tts-btn:active {
    background: rgba(72, 187, 120, 0.18);
  }
  .tts-btn.playing {
    background: rgba(232, 168, 124, 0.15);
    color: var(--amber);
    border-color: var(--amber);
    animation: pulse 2s ease-in-out infinite;
  }
  .tts-btn.paused {
    background: rgba(232, 168, 124, 0.08);
    color: var(--amber);
    border-color: rgba(232, 168, 124, 0.3);
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.7; }
  }
  .tts-speed {
    background: transparent;
    border: 1px solid var(--line);
    color: var(--text-muted);
    height: 32px;
    padding: 0 0.6rem;
    border-radius: 6px;
    cursor: pointer;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem;
    min-width: 48px;
  }
  .tts-speed:hover, .tts-speed:active { color: var(--blue); border-color: var(--blue); }

  /* ── Main content ────────────────────────────── */
  main {
    max-width: 760px;
    margin: 0 auto;
    padding: 2.5rem 1.5rem 4rem;
  }

  .content {
    font-family: 'Source Serif 4', Georgia, serif;
    font-size: 1.05rem;
    line-height: 1.8;
    color: var(--text);
  }
  .content[data-size="sm"] { font-size: 0.95rem; line-height: 1.75; }
  .content[data-size="md"] { font-size: 1.05rem; line-height: 1.8; }
  .content[data-size="lg"] { font-size: 1.2rem;  line-height: 1.85; }

  /* Headings */
  .content h1 {
    font-family: 'Source Serif 4', serif;
    font-size: 2.4rem;
    font-weight: 700;
    line-height: 1.15;
    margin: 0 0 2rem;
    padding-bottom: 1rem;
    border-bottom: 2px solid var(--blue);
    color: var(--text);
  }
  .content h2 {
    font-family: 'Source Serif 4', serif;
    font-size: 1.6rem;
    font-weight: 600;
    line-height: 1.25;
    margin: 3rem 0 1rem;
    color: var(--blue);
    padding-top: 0.5rem;
  }
  .content h3 {
    font-family: 'Source Serif 4', serif;
    font-size: 1.25rem;
    font-weight: 600;
    margin: 2.25rem 0 0.75rem;
    color: var(--amber);
    line-height: 1.3;
  }
  .content h4 {
    font-family: 'Inter', sans-serif;
    font-size: 0.95rem;
    font-weight: 600;
    margin: 1.5rem 0 0.5rem;
    color: var(--green);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  /* Paragraphs and text */
  .content p {
    margin: 0 0 1.25rem;
  }
  .content p + p { margin-top: 0; }

  .content strong {
    color: #ffffff;
    font-weight: 600;
  }
  .content em {
    color: var(--amber);
    font-style: italic;
  }
  .content strong em, .content em strong {
    color: var(--amber);
    font-weight: 600;
    font-style: italic;
  }

  /* Links */
  .content a {
    color: var(--blue);
    text-decoration: none;
    border-bottom: 1px dashed rgba(74, 158, 255, 0.4);
    transition: border-color 0.15s;
  }
  .content a:hover {
    border-bottom-color: var(--blue);
  }

  /* Lists */
  .content ul, .content ol {
    margin: 0 0 1.25rem;
    padding-left: 1.5rem;
  }
  .content li {
    margin-bottom: 0.4rem;
  }
  .content li::marker {
    color: var(--text-muted);
  }
  .content ul li::marker {
    color: var(--blue);
  }
  .content li > ul, .content li > ol {
    margin: 0.4rem 0 0.5rem;
  }

  /* Code */
  .content code {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.9em;
    background: var(--code-bg);
    padding: 0.15em 0.4em;
    border-radius: 4px;
    border: 1px solid var(--line);
    color: var(--amber);
  }
  .content pre {
    background: rgba(0,0,0,0.3);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 1.25rem 1.5rem;
    overflow-x: auto;
    margin: 0 0 1.5rem;
    -webkit-overflow-scrolling: touch;
  }
  .content pre code {
    background: none;
    border: none;
    padding: 0;
    color: var(--text-dim);
    font-size: 0.9rem;
    line-height: 1.65;
  }

  /* Blockquotes */
  .content blockquote {
    margin: 1.5rem 0;
    padding: 0.75rem 1.25rem;
    border-left: 3px solid var(--amber);
    background: rgba(232, 168, 124, 0.06);
    color: var(--text-dim);
    border-radius: 0 8px 8px 0;
    font-style: italic;
  }
  .content blockquote p:last-child { margin-bottom: 0; }

  /* Tables */
  .content table {
    width: 100%;
    border-collapse: collapse;
    margin: 1.5rem 0;
    font-family: 'Inter', sans-serif;
    font-size: 0.95em;
    border: 1px solid var(--line);
    border-radius: 8px;
    overflow: hidden;
    display: block;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }
  .content table thead {
    background: rgba(74, 158, 255, 0.1);
  }
  .content table th {
    padding: 0.75rem 1rem;
    text-align: left;
    font-weight: 600;
    color: var(--blue);
    border-bottom: 1px solid var(--line-strong);
    font-size: 0.85rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    white-space: nowrap;
  }
  .content table td {
    padding: 0.75rem 1rem;
    border-bottom: 1px solid var(--line);
    vertical-align: top;
  }
  .content table tr:last-child td { border-bottom: none; }
  .content table tr:hover td { background: rgba(255,255,255,0.02); }

  /* Horizontal rule */
  .content hr {
    border: none;
    border-top: 1px solid var(--line);
    margin: 2.5rem 0;
    position: relative;
  }
  .content hr::after {
    content: '◆';
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: var(--navy-dark);
    padding: 0 1rem;
    color: var(--text-faded);
    font-size: 0.7rem;
  }

  /* Loading / error */
  .status {
    text-align: center;
    padding: 4rem 1rem;
    color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.9rem;
  }
  .status.error { color: var(--amber); }

  @media (max-width: 540px) {
    .topbar { padding: 0.75rem 1rem; padding-top: calc(0.75rem + env(safe-area-inset-top)); }
    .doc-name { display: none; }
    main { padding: 2rem 1.1rem 3rem; }
    .content h1 { font-size: 1.8rem; }
    .content h2 { font-size: 1.35rem; margin-top: 2.25rem; }
    .content h3 { font-size: 1.15rem; }
    .back-link { font-size: 0.75rem; padding: 0.3rem 0.55rem; }
    .size-btn { width: 30px; height: 30px; }
  }
</style>
</head>
<body>

<nav class="topbar">
  <a href="./" class="back-link">&larr; Hub</a>
  <div class="doc-name" id="docName">&mdash;</div>
  <div class="tts" id="ttsControls" style="display:none;">
    <button class="tts-btn" id="ttsPlay" aria-label="Read aloud">
      <span id="ttsIcon">&#9654;</span> <span id="ttsLabel">Read</span>
    </button>
    <button class="tts-speed" id="ttsSpeed" aria-label="Speed">1.0&times;</button>
  </div>
  <div class="size-toggle" role="group" aria-label="Text size">
    <button class="size-btn sm" data-size="sm" aria-label="Small">A</button>
    <button class="size-btn md active" data-size="md" aria-label="Medium">A</button>
    <button class="size-btn lg" data-size="lg" aria-label="Large">A</button>
  </div>
</nav>

<main>
  <div class="content" id="content" data-size="md">
    <div class="status">Loading&hellip;</div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/marked@11.1.1/marked.min.js"></script>
<script>
(function() {
  var STORAGE_KEY = 'viewer_size_v1';

  var content = document.getElementById('content');
  var docName = document.getElementById('docName');

  // Get ?doc= param
  var params = new URLSearchParams(window.location.search);
  var doc = params.get('doc');
  var title = params.get('title');

  function showError(msg) {
    content.innerHTML = '<div class="status error">' + msg + '</div>';
  }

  if (!doc) {
    showError('No document specified. Go back to the hub and pick one.');
    return;
  }

  // Sanitize: only allow simple relative paths (no ../ traversal)
  if (!/^[A-Za-z0-9_./-]+\.(md|markdown|txt)$/.test(doc) || doc.indexOf('..') !== -1) {
    showError('Invalid document path.');
    return;
  }

  docName.textContent = title || doc;
  document.title = 'Stage · ' + (title || doc);

  // Configure marked
  if (typeof marked !== 'undefined') {
    marked.setOptions({
      gfm: true,
      breaks: false,
      headerIds: true,
      mangle: false
    });
  }

  fetch(doc, { cache: 'no-store' })
    .then(function(r) {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.text();
    })
    .then(function(text) {
      if (typeof marked === 'undefined') {
        // Fallback: show raw text in a pre block if library failed to load
        var pre = document.createElement('pre');
        pre.textContent = text;
        content.innerHTML = '';
        content.appendChild(pre);
        return;
      }
      content.innerHTML = marked.parse(text);
      // Scroll to hash anchor if present
      if (window.location.hash) {
        setTimeout(function() {
          var el = document.querySelector(window.location.hash);
          if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }, 100);
      }
    })
    .catch(function(err) {
      showError('Could not load: ' + doc + '<br><small>' + err.message + '</small>');
    });

  // Size toggle
  var savedSize = localStorage.getItem(STORAGE_KEY) || 'md';
  setSize(savedSize);

  function setSize(size) {
    content.dataset.size = size;
    document.querySelectorAll('.size-btn').forEach(function(b) {
      b.classList.toggle('active', b.dataset.size === size);
    });
    localStorage.setItem(STORAGE_KEY, size);
  }

  document.querySelectorAll('.size-btn').forEach(function(b) {
    b.addEventListener('click', function() { setSize(b.dataset.size); });
  });

  // ── Text-to-Speech ─────────────────────────────
  var SPEED_KEY = 'viewer_tts_speed_v1';
  var SPEEDS = [0.9, 1.0, 1.15, 1.3, 1.5];
  var ttsControls = document.getElementById('ttsControls');
  var ttsPlay = document.getElementById('ttsPlay');
  var ttsIcon = document.getElementById('ttsIcon');
  var ttsLabel = document.getElementById('ttsLabel');
  var ttsSpeed = document.getElementById('ttsSpeed');
  var currentSpeed = parseFloat(localStorage.getItem(SPEED_KEY)) || 1.0;
  var utterance = null;
  var ttsState = 'idle'; // idle | playing | paused

  if ('speechSynthesis' in window) {
    ttsControls.style.display = 'flex';
    updateSpeedLabel();
  }

  function updateSpeedLabel() {
    ttsSpeed.textContent = currentSpeed.toFixed(currentSpeed === 1 ? 1 : 2).replace(/0$/, '') + '×';
  }

  function extractReadableText() {
    // Take visible rendered text. Strip square-bracket stage directions
    // like [Hold. Let the laugh come to you.] — they're cues, not speech.
    var raw = content.innerText || content.textContent || '';
    raw = raw.replace(/\[[^\]]*\]/g, ' ');
    // Collapse whitespace
    raw = raw.replace(/\s+/g, ' ').trim();
    return raw;
  }

  function setState(state) {
    ttsState = state;
    ttsPlay.classList.remove('playing', 'paused');
    if (state === 'playing') {
      ttsPlay.classList.add('playing');
      ttsIcon.innerHTML = '&#9616;&#9616;'; // pause bars
      ttsLabel.textContent = 'Pause';
    } else if (state === 'paused') {
      ttsPlay.classList.add('paused');
      ttsIcon.innerHTML = '&#9654;';
      ttsLabel.textContent = 'Resume';
    } else {
      ttsIcon.innerHTML = '&#9654;';
      ttsLabel.textContent = 'Read';
    }
  }

  function startSpeaking() {
    window.speechSynthesis.cancel();
    var text = extractReadableText();
    if (!text) return;
    utterance = new SpeechSynthesisUtterance(text);
    utterance.rate = currentSpeed;
    utterance.pitch = 1.0;
    utterance.onend = function() { setState('idle'); };
    utterance.onerror = function() { setState('idle'); };
    window.speechSynthesis.speak(utterance);
    setState('playing');
  }

  ttsPlay.addEventListener('click', function() {
    if (ttsState === 'idle') {
      startSpeaking();
    } else if (ttsState === 'playing') {
      window.speechSynthesis.pause();
      setState('paused');
    } else if (ttsState === 'paused') {
      window.speechSynthesis.resume();
      setState('playing');
    }
  });

  ttsSpeed.addEventListener('click', function() {
    var i = SPEEDS.indexOf(currentSpeed);
    currentSpeed = SPEEDS[(i + 1) % SPEEDS.length];
    localStorage.setItem(SPEED_KEY, String(currentSpeed));
    updateSpeedLabel();
    // If currently playing, restart at new speed from current position
    if (ttsState !== 'idle') {
      window.speechSynthesis.cancel();
      setState('idle');
      startSpeaking();
    }
  });

  // Stop reading if user leaves or navigates away
  window.addEventListener('beforeunload', function() {
    window.speechSynthesis.cancel();
  });

  // Keyboard: Esc → back to hub
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
      window.speechSynthesis.cancel();
      window.location.href = './';
    } else if (e.key === '-' || e.key === '_') {
      var order = ['sm','md','lg'];
      var i = order.indexOf(content.dataset.size);
      if (i > 0) setSize(order[i-1]);
    } else if (e.key === '+' || e.key === '=') {
      var order = ['sm','md','lg'];
      var i = order.indexOf(content.dataset.size);
      if (i < order.length - 1) setSize(order[i+1]);
    } else if (e.key === ' ' && ttsControls.style.display !== 'none') {
      // Space = play/pause (as long as focus isn't on a button)
      if (document.activeElement.tagName !== 'BUTTON') {
        e.preventDefault();
        ttsPlay.click();
      }
    }
  });
})();
</script>
</body>
</html>
